    security-audit:
        name: Security Audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            
            - name: Install Rust
              uses: actions-rs/toolchain@v1
              with:
                profile: minimal
                toolchain: stable
                override: true
            
            - name: Install cargo-audit
              run: cargo install cargo-audit
                
            - name: Run security audit
              run: cargo audit
